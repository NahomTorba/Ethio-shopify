am:
  hello: "ሰላም"
  telegram:
    welcome: "ወደ Sellz Telegram Bot እንኳን በደህና መጡ። ቋንቋዎን ይምረጡ እና ሱቅዎን ማስተዳደር ይጀምሩ።"
    welcome_with_shop: "ወደ %{shop_name} እንኳን በደህና መጡ! በ Telegram በቀላሉ ምርቶቻችንን ይመልከቱ እና ትዕዛዞችን ያድርጉ።"
    language_updated: "ቋንቋው ወደ አማርኛ ተቀይሯል።"
    unknown_command: "ይህን መልእክት አልገባኝም። ከታች ያሉትን የቋንቋ አዝራሮች ይጠቀሙ ወይም /start ይላኩ።"
    keyboard:
      english: "English"
      amharic: "አማርኛ"
      create_shop: "ሱቅ ፍጠር"
      create_new_shop: "አዲስ ሱቅ ፍጠር"
      open_shop: "ሱቅ ክፈት"
    createshop:
      start: "ሱቅዎን እንፈጥር! ከታች ያለውን ቁልፍ ተጠቅመው አዲስ ሱቅዎን ያዘጋጁ።"
      ask_username: "በመጨረሻ ለሱቅዎን ቦት ስም ይምረጡ (ለምሳሌ፡ myshop_bot)።"
      username_taken: "ይቅርታ፣ ይህ ስም ተወስዷል። እባክዎን የተለየ ስም ይምረጡ።"
      success: "ሱቅዎ ተፈጥሯል! የሱቅዎን ቦት ዝግጁ ነው፡"
      error: "እባክዎን እንደገና ይሞክሩ።"
  notifications:
    low_stock_alert: "ማስታወሻ! %{product_name} ከፍተኛ ነገር ነው። ለእርስዎ ብቻ %{count} ተረፍቷል።"
  buttons:
    restock: "እንደገና +10"
  messages:
    restock_success: "10 ክፍል በትክክል ተጨምሯል። አዲስ ድምር ነው %{total}።"
  errors:
    product_not_found: "ምርት አልተገኘም ወይም ለማሻሻል ፈቃድ የእርስዎ አይደለም።"
